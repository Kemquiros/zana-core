name: Sovereign CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install typer rich numpy cryptography pytest boto3 questionary
      - name: Run Tests
        run: PYTHONPATH=.:cli pytest tests/ -v
