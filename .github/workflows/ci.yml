name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "hotfix/**", "chore/**", "release/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.12"

# ── Stage 1: Quality — lint, type-check, secrets scan ─────────────────────────
jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install lint tools
        run: uv pip install --system ruff mypy

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: MyPy — type check
        run: mypy --ignore-missing-imports cli/zana/
        continue-on-error: true

      - name: Secrets scan
        run: |
          ! grep -rn "sk-[a-zA-Z0-9]\{48\}" --include="*.py" --include="*.rs" --include="*.toml" .
          ! grep -rn "AIza[a-zA-Z0-9_-]\{35\}" --include="*.py" .
          ! grep -rn "AKIA[A-Z0-9]\{16\}" --include="*.py" --include="*.toml" .

# ── Stage 2a: Python Tests — security, ZSM, onboarding ───────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install CLI + test dependencies
        run: uv pip install --system -e "cli" pytest pytest-cov

      - name: Security tests (43 checks)
        run: pytest cli/tests/test_security.py -v --tb=short

      - name: ZSM intent tests (44 checks)
        run: pytest cli/tests/test_zsm_intents.py -v --tb=short

      - name: Onboarding tests
        run: pytest cli/tests/test_onboarding.py -v --tb=short
        env:
          ZANA_NON_INTERACTIVE: "1"

      - name: Full test suite with coverage
        run: |
          pytest cli/tests/ \
            --tb=short \
            --cov=cli/zana \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q
        env:
          ZANA_NON_INTERACTIVE: "1"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

# ── Stage 2b: Rust — fmt, clippy, build (parallel with Python tests) ──────────
  rust:
    name: Rust (fmt + clippy + build)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
            armor/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check — rust_core
        run: cd rust_core && cargo fmt -- --check

      - name: Format check — armor
        run: cd armor && cargo fmt -- --check

      - name: Clippy — rust_core
        run: cd rust_core && cargo clippy --features python -- -D warnings

      - name: Clippy — armor
        run: cd armor && cargo clippy --features python -- -D warnings

      - name: Build rust_core (release)
        run: |
          cd rust_core
          cargo build --release --features python
          cp target/release/libzana_steel_core.so ../zana_steel_core.so

      - name: Build armor (release)
        run: |
          cd armor
          cargo build --release --features python
          cp target/release/libzana_armor.so ../zana_armor.so
        continue-on-error: true

      - name: Benchmark (cold — no Docker)
        run: |
          cd rust_core
          cargo run --release 2>&1 | tail -20
        continue-on-error: true

      - name: Upload Rust libs
        uses: actions/upload-artifact@v4
        with:
          name: rust-libs-${{ github.sha }}
          path: |
            zana_steel_core.so
            zana_armor.so
          retention-days: 1

# ── Stage 3: Release — GitHub Release + PyPI (only on version tags) ───────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, rust]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download Rust libs
        uses: actions/download-artifact@v4
        with:
          name: rust-libs-${{ github.sha }}

      - name: Install build + publish tools
        run: uv pip install --system build hatchling twine

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pin CLI version to tag
        run: sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" cli/pyproject.toml

      - name: Build CLI wheel + sdist
        run: cd cli && python -m build --wheel --sdist --outdir dist/

      - name: Extract CHANGELOG section for this release
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release_notes.md
          fi
          echo "Generated release notes:"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ZANA ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          files: |
            cli/dist/*.whl
            cli/dist/*.tar.gz
            scripts/install.sh
            scripts/install.ps1
            zana_steel_core.so
            zana_armor.so
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload cli/dist/*.whl cli/dist/*.tar.gz --skip-existing

      - name: Release summary
        run: |
          echo "## Release ${{ github.ref_name }} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Channel | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ✅ Created |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI (vecanova-zana) | ✅ Published |" >> $GITHUB_STEP_SUMMARY
          echo "| npm (@vecanova/zana) | ⏳ Pending (next job) |" >> $GITHUB_STEP_SUMMARY

# ── Stage 4: npm publish ───────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump npm package version
        run: |
          cd packages/zana-npm
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish @vecanova/zana
        run: cd packages/zana-npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm summary
        run: |
          echo "| npm (@vecanova/zana) | ✅ Published |" >> $GITHUB_STEP_SUMMARY
