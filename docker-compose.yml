services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: zana
      POSTGRES_USER: zana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zana_pass}
    ports:
      - "${ZANA_POSTGRES_PORT:-55433}:5432"
    volumes:
      - ${ZANA_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./procedural_memory/identity_schema.sql:/docker-entrypoint-initdb.d/01-identity-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zana -d zana"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${ZANA_REDIS_PORT:-56380}:6379"
    volumes:
      - ${ZANA_DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-zana_neo4j}
    ports:
      - "${ZANA_NEO4J_HTTP_PORT:-57474}:7474"
      - "${ZANA_NEO4J_BOLT_PORT:-57687}:7687"
    volumes:
      - ./data/neo4j/data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-zana_neo4j} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: sensory/Dockerfile
      args:
        ZANA_GATEWAY_PORT: ${ZANA_GATEWAY_PORT:-54446}
    restart: unless-stopped
    ports:
      - "${ZANA_GATEWAY_PORT:-54446}:${ZANA_GATEWAY_PORT:-54446}"
    environment:
      - GATEWAY_PORT=${ZANA_GATEWAY_PORT:-54446}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host-gateway:11434}
      - SYMBIOSIS_URL=${SYMBIOSIS_URL:-http://localhost:4444}
      - POSTGRES_URL=postgresql://zana:${POSTGRES_PASSWORD:-zana_pass}@postgres:5432/zana
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-zana_neo4j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ZANA_GATEWAY_PORT:-54446}/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  aria-ui:
    build:
      context: aria-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ZANA_PWA_PORT:-54448}:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:${ZANA_GATEWAY_PORT:-54446}}
    depends_on:
      gateway:
        condition: service_healthy

  telegram-bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - ZANA_GATEWAY_URL=http://gateway:${ZANA_GATEWAY_PORT:-54446}
    depends_on:
      gateway:
        condition: service_healthy
    profiles:
      - telegram

  n8n:
    image: n8nio/n8n:latest
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-zana_admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-zana_n8n_secure}
      - GENERIC_TIMEZONE=America/Bogota
    ports:
      - "${ZANA_N8N_PORT:-5678}:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
    environment:
      - ZANA_DOMAIN=${ZANA_DOMAIN:-:80}
      - ZANA_GATEWAY_HOST=${ZANA_GATEWAY_HOST:-gateway}
      - ZANA_GATEWAY_PORT=${ZANA_GATEWAY_PORT:-54446}
      - ZANA_PWA_HOST=${ZANA_PWA_HOST:-aria-ui}
    depends_on:
      - aria-ui
      - gateway
