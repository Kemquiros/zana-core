repos:
  # ── Hygiene ────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: "^(final_test/|dist/|.*\\.so$|.*\\.whl$|.*\\.deb$)"
      - id: debug-statements
        language_version: python3.12

  # ── Ruff: lint (published CLI only — legacy modules migrate gradually) ─────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        name: ruff lint (cli/)
        args: ["--fix", "--config", "ruff.toml"]
        files: ^cli/
        types_or: [python, pyi]

  # ── Ruff: format (all Python files) ────────────────────────────────────────
      - id: ruff-format
        args: ["--config", "ruff.toml"]
        types_or: [python, pyi]

  # ── CLI smoke tests (< 8 s, no LLM, no services) ──────────────────────────
  - repo: local
    hooks:
      - id: zana-smoke
        name: zana CLI smoke tests
        entry: python tests/cli_e2e_engine.py --smoke
        language: system
        pass_filenames: false
        always_run: true

  # ── Three Dirty Pigs — chaos engineering quality gate ─────────────────────
  - repo: local
    hooks:
      # PAJA: fast surface scan — secrets, lint, dead code, complexity
      # Blocks on CRITICAL only (secret leaks, hardcoded credentials)
      - id: pigs-straw
        name: "🐷 PAJA — Surface Scan (secrets / lint / dead code)"
        entry: python /home/kemquiros/.claude/skills/vecanova-three-little-dirty-pigs/engine.py
        args:
          - "--pig"
          - "straw"
          - "--fail-on"
          - "critical"
          - "--no-report"
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      # PALITOS: OWASP + architecture — scoped to cli/ (the PyPI/npm package)
      # Blocks on HIGH+ (injection, broken auth, insecure deps, SSRF)
      - id: pigs-stick-cli
        name: "🐷 PALITOS — OWASP + Architecture (cli/ → PyPI)"
        entry: python /home/kemquiros/.claude/skills/vecanova-three-little-dirty-pigs/engine.py
        args:
          - "--target"
          - "cli/"
          - "--pig"
          - "stick"
          - "--fail-on"
          - "high"
          - "--no-report"
        language: system
        pass_filenames: false
        types_or: [python, pyi]
        files: ^cli/
