repos:
  # ── Hygiene ────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: "^(final_test/|dist/|.*\\.so$|.*\\.whl$|.*\\.deb$)"
      - id: debug-statements
        language_version: python3.12

  # ── Ruff: lint (published CLI only — legacy modules migrate gradually) ─────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        name: ruff lint (zana CLI)
        args: ["--fix", "--config", "ruff.toml"]
        files: ^cli/zana/
        types_or: [python, pyi]

  # ── Ruff: format (all Python files) ────────────────────────────────────────
      - id: ruff-format
        args: ["--config", "ruff.toml"]
        types_or: [python, pyi]

  # ── CLI smoke tests (< 8 s, no LLM, no services) ──────────────────────────
  - repo: local
    hooks:
      - id: zana-smoke
        name: zana CLI smoke tests
        entry: python tests/cli_e2e_engine.py --smoke
        language: system
        pass_filenames: false
        always_run: true

